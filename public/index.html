<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FZ300 Remote</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #252525;
    --surface2: #2f2f2f;
    --border: #3a3a3a;
    --accent: #e8a020;
    --accent-dim: #b07818;
    --red: #e05050;
    --green: #50c050;
    --blue: #4a90e2;
    --text: #e8e8e8;
    --text-dim: #888;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100dvh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  #status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  #status-dot.connected { background: var(--green); }
  #status-dot.error     { background: var(--red); }
  #camera-ip { color: var(--text-dim); font-size: 12px; margin-left: auto; }

  main { padding: 12px; display: flex; flex-direction: column; gap: 12px; max-width: 480px; margin: 0 auto; }

  section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  section h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .btn-grid {
    display: grid;
    gap: 8px;
    padding: 10px;
  }
  .btn-grid.cols2 { grid-template-columns: 1fr 1fr; }
  .btn-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }

  button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 8px;
    text-align: center;
    transition: background .1s, transform .08s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(.96); background: var(--border); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent-dim); }
  button.primary:active { background: var(--accent-dim); }
  button.danger  { background: var(--red); color: #fff; border-color: #a03030; }
  button.danger:active { background: #a03030; }
  button.good    { background: var(--green); color: #000; border-color: #309030; }
  button.good:active { background: #309030; }
  button.blue    { background: var(--blue); color: #fff; border-color: #2a60a0; }
  button.hold    { background: var(--surface2); }

  /* Shutter button */
  #btn-capture {
    width: 80px; height: 80px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    background: var(--accent);
    color: #000;
    border: 4px solid var(--accent-dim);
    box-shadow: 0 0 0 6px var(--surface2);
    margin: 4px auto;
    display: block;
  }
  #btn-capture:active { transform: scale(.93); }

  /* Zoom/focus D-pad */
  .dpad {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 4px;
    padding: 10px;
    max-width: 200px;
    margin: 0 auto;
  }
  .dpad button { padding: 12px 4px; font-size: 18px; }
  .dpad .center { background: var(--border); cursor: default; }
  .dpad .center:active { transform: none; }

  /* Settings row */
  .setting-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { width: 80px; color: var(--text-dim); font-size: 12px; }
  .setting-row select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 13px;
    padding: 5px 8px;
  }
  .setting-row button { padding: 5px 12px; font-size: 12px; }

  /* Log */
  #log {
    background: #111;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    height: 130px;
    overflow-y: auto;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-entry { color: var(--text-dim); }
  .log-entry.ok  { color: #6dbf6d; }
  .log-entry.err { color: #e07070; }
  .log-entry .ts { color: #555; margin-right: 6px; }

  /* Mode bar */
  .mode-bar {
    display: flex;
    gap: 8px;
    padding: 10px;
  }
  .mode-bar button { flex: 1; }

  /* Video indicator */
  #video-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--red);
    font-weight: 600;
  }
  #video-indicator.active { display: flex; }
  #video-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <h1>Lumix FZ300 Remote</h1>
  <span id="camera-ip">—</span>
</header>

<main>

  <!-- Connect -->
  <section>
    <h2>Session</h2>
    <div class="btn-grid cols2">
      <button class="good" onclick="connect()">⚡ Connect</button>
      <button onclick="getState()">📊 Get State</button>
    </div>
  </section>

  <!-- Mode -->
  <section>
    <h2>Mode</h2>
    <div class="mode-bar">
      <button class="blue" onclick="setMode('rec')">📷 Record mode</button>
      <button onclick="setMode('play')">▶ Play mode</button>
    </div>
  </section>

  <!-- Shutter -->
  <section>
    <h2>Capture</h2>
    <button id="btn-capture" onclick="capture()">SHOOT</button>
    <div class="btn-grid cols2" style="padding-top:0">
      <button onmousedown="afOn()" onmouseup="afOff()" ontouchstart="afOn()" ontouchend="afOff()">🎯 AF (hold)</button>
      <button onclick="capture()">📷 Capture</button>
    </div>
  </section>

  <!-- Video -->
  <section>
    <h2>Video</h2>
    <div id="video-indicator"><div id="video-dot"></div> Recording…</div>
    <div class="btn-grid cols2">
      <button class="danger" onclick="videoStart()">⏺ Start rec</button>
      <button onclick="videoStop()">⏹ Stop rec</button>
    </div>
  </section>

  <!-- Zoom -->
  <section>
    <h2>Zoom</h2>
    <div class="dpad">
      <div></div>
      <button onmousedown="zoom('tele','slow')" onmouseup="zoomStop()"
              ontouchstart="zoom('tele','slow')" ontouchend="zoomStop()">🔭 T</button>
      <div></div>
      <button onmousedown="zoom('tele','fast')" onmouseup="zoomStop()"
              ontouchstart="zoom('tele','fast')" ontouchend="zoomStop()">T+</button>
      <div class="center dpad" style="font-size:12px;padding:4px;color:var(--text-dim)">ZOOM</div>
      <button onmousedown="zoom('wide','fast')" onmouseup="zoomStop()"
              ontouchstart="zoom('wide','fast')" ontouchend="zoomStop()">W+</button>
      <div></div>
      <button onmousedown="zoom('wide','slow')" onmouseup="zoomStop()"
              ontouchstart="zoom('wide','slow')" ontouchend="zoomStop()">🌐 W</button>
      <div></div>
    </div>
  </section>

  <!-- Focus -->
  <section>
    <h2>Manual Focus</h2>
    <div class="dpad">
      <div></div>
      <button onmousedown="focus('far','slow')" onmouseup="focusStop()"
              ontouchstart="focus('far','slow')" ontouchend="focusStop()">Far</button>
      <div></div>
      <button onmousedown="focus('far','fast')" onmouseup="focusStop()"
              ontouchstart="focus('far','fast')" ontouchend="focusStop()">Far+</button>
      <div class="center dpad" style="font-size:12px;padding:4px;color:var(--text-dim)">FOCUS</div>
      <button onmousedown="focus('near','fast')" onmouseup="focusStop()"
              ontouchstart="focus('near','fast')" ontouchend="focusStop()">Near+</button>
      <div></div>
      <button onmousedown="focus('near','slow')" onmouseup="focusStop()"
              ontouchstart="focus('near','slow')" ontouchend="focusStop()">Near</button>
      <div></div>
    </div>
  </section>

  <!-- Settings -->
  <section>
    <h2>Settings</h2>
    <div class="setting-row">
      <label>ISO</label>
      <select id="sel-iso"></select>
      <button onclick="setSetting('iso')">Set</button>
      <button onclick="getSetting('iso')">Get</button>
    </div>
    <div class="setting-row">
      <label>Shutter</label>
      <select id="sel-shutter"></select>
      <button onclick="setSetting('shutter')">Set</button>
      <button onclick="getSetting('shutter')">Get</button>
    </div>
    <div class="setting-row">
      <label>WB</label>
      <select id="sel-wb"></select>
      <button onclick="setSetting('wb')">Set</button>
      <button onclick="getSetting('wb')">Get</button>
    </div>
    <div class="setting-row">
      <label>AF Mode</label>
      <select id="sel-afmode"></select>
      <button onclick="setSetting('afmode')">Set</button>
      <button onclick="getSetting('afmode')">Get</button>
    </div>
    <div class="setting-row">
      <label>Quality</label>
      <select id="sel-quality"></select>
      <button onclick="setSetting('quality')">Set</button>
      <button onclick="getSetting('quality')">Get</button>
    </div>
    <div class="setting-row">
      <label>Exp. Comp</label>
      <select id="sel-expcomp"></select>
      <button onclick="setSetting('expcomp')">Set</button>
      <button onclick="getSetting('expcomp')">Get</button>
    </div>
  </section>

  <!-- Log -->
  <section>
    <h2>Log</h2>
    <div id="log"></div>
  </section>

</main>

<script>
const settingSelectMap = {
  iso:     'sel-iso',
  shutter: 'sel-shutter',
  wb:      'sel-wb',
  afmode:  'sel-afmode',
  quality: 'sel-quality',
  expcomp: 'sel-expcomp',
};

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(path, opts);
    return await r.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

function log(msg, type = '') {
  const el = document.getElementById('log');
  const ts = new Date().toTimeString().slice(0, 8);
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.innerHTML = `<span class="ts">${ts}</span>${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function cameraError(response) {
  // Camera returns XML like <result>err_unsuitable_app</result> on failure
  const m = response && response.match(/<result>(err_[^<]+)<\/result>/);
  return m ? m[1] : null;
}

function handleResult(res, label) {
  if (res.ok) {
    const camErr = cameraError(res.response);
    if (camErr) {
      log(`${label}: ${camErr}`, 'err');
      document.getElementById('status-dot').className = 'error';
    } else {
      log(`${label}: ${res.response?.slice(0, 80) ?? ''}`, 'ok');
      document.getElementById('status-dot').className = 'connected';
    }
  } else {
    log(`${label} FAILED: ${res.error}`, 'err');
    document.getElementById('status-dot').className = 'error';
  }
}

async function connect() {
  const res = await api('GET', '/api/connect');
  handleResult(res, 'Connect');
  if (res.ok && !cameraError(res.response)) {
    const modeRes = await api('POST', '/api/mode/rec');
    handleResult(modeRes, 'Mode: rec');
  }
}

async function getState() {
  const res = await api('GET', '/api/state');
  handleResult(res, 'State');
}

async function setMode(mode) {
  const res = await api('POST', `/api/mode/${mode}`);
  handleResult(res, `Mode: ${mode}`);
}

async function capture() {
  const res = await api('POST', '/api/capture');
  handleResult(res, 'Capture');
}

async function afOn()  { await api('POST', '/api/af/on');  log('AF on', 'ok'); }
async function afOff() { await api('POST', '/api/af/off'); log('AF off'); }

let recording = false;
async function videoStart() {
  const res = await api('POST', '/api/video/start');
  handleResult(res, 'Video start');
  if (res.ok) {
    recording = true;
    document.getElementById('video-indicator').className = 'active';
  }
}
async function videoStop() {
  const res = await api('POST', '/api/video/stop');
  handleResult(res, 'Video stop');
  recording = false;
  document.getElementById('video-indicator').className = '';
}

async function zoom(dir, speed) {
  const path = `/api/zoom/${dir}/${speed}`;
  await api('POST', path);
}
async function zoomStop() {
  await api('POST', '/api/zoom/stop');
}

async function focus(dir, speed) {
  const path = `/api/focus/${dir}/${speed}`;
  await api('POST', path);
}
async function focusStop() {
  await api('POST', '/api/focus/stop');
}

async function setSetting(setting) {
  const selId = settingSelectMap[setting];
  const value = document.getElementById(selId).value;
  const res = await api('POST', `/api/setting/${setting}`, { value });
  handleResult(res, `Set ${setting}=${value}`);
}

async function getSetting(setting) {
  const res = await api('GET', `/api/setting/${setting}`);
  handleResult(res, `Get ${setting}`);
}

async function init() {
  // Load camera IP
  const ipRes = await api('GET', '/api/camera-ip');
  document.getElementById('camera-ip').textContent = ipRes.ip || '?';

  // Populate setting dropdowns
  const svRes = await api('GET', '/api/setting-values');
  if (svRes) {
    populate('sel-iso',     svRes.iso);
    populate('sel-shutter', svRes.shutterSpeed);
    populate('sel-wb',      svRes.wb);
    populate('sel-afmode',  svRes.afmode);
    populate('sel-quality', svRes.quality);
    populate('sel-expcomp', svRes.expcomp);
  }

  log('UI ready — click Connect first', '');
}

function populate(id, values) {
  const sel = document.getElementById(id);
  sel.innerHTML = values.map(v => `<option value="${v}">${v}</option>`).join('');
}

init();
</script>
</body>
</html>
